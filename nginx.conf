# Nginx TLS Reverse Proxy Configuration for DGC IMS

upstream api_backend {
  least_conn;
  server api:4000 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

upstream web_frontend {
  server web:80 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/15m;
limit_req_zone $http_x_forwarded_for zone=user_limit:10m rate=100r/m;

# Redirect HTTP to HTTPS
server {
  listen 80;
  server_name inventory.dgc.go.jm _;
  return 301 https://$server_name$request_uri;
}

# HTTPS Server with TLS 1.2+
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name inventory.dgc.go.jm;

  # TLS Certificates
  ssl_certificate /etc/nginx/certs/server.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;
  ssl_trusted_certificate /etc/nginx/certs/ca-chain.crt;

  # TLS Configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_session_tickets off;

  # HSTS (HTTP Strict Transport Security)
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # Security Headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Logging
  access_log /var/log/nginx/dgc_ims_access.log combined;
  error_log /var/log/nginx/dgc_ims_error.log warn;

  # Proxy settings
  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # Root location
  location / {
    proxy_pass http://web_frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API endpoints with rate limiting
  location /api/ {
    limit_req zone=api_limit burst=10 nodelay;
    limit_req zone=user_limit burst=50 nodelay;

    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_keep_alive 32;
  }

  # Login endpoint with stricter rate limiting
  location /api/auth/login {
    limit_req zone=login_limit burst=2 nodelay;
    
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Health check endpoint (no rate limit)
  location /api/health {
    access_log off;
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # Hide server version
  server_tokens off;

  # Disable unwanted HTTP methods
  if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS|HEAD)$) {
    return 405;
  }

  # Deny access to sensitive files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
  }
}

# Uptime monitoring
server {
  listen 8080;
  server_name localhost;

  location /nginx_status {
    stub_status on;
    access_log off;
    allow 127.0.0.1;
    deny all;
  }
}
