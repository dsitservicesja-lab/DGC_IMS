version: "3.9"

services:
  db:
    image: postgres:16
    container_name: dgc_ims_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dgc_ims
      POSTGRES_USER: dgc_ims
      POSTGRES_PASSWORD: dgc_ims
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dgc_ims_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
    container_name: dgc_ims_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  db_data:
